<!doctype html>
<html lang="tr" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Taqqı Gelir/Gider{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark border-bottom nav-glow">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('index') }}">
          <img src="{{ url_for('logo') }}" alt="Logo" width="34" height="34" class="rounded" />
          <span class="fw-semibold">Taqqı Gelir/Gider</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-controls="nav" aria-expanded="false" aria-label="Menüyü aç">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
          <div class="navbar-nav ms-auto">
            <a class="nav-link" href="{{ url_for('index', month=month if month is defined else None) }}">Günlük Kayıt</a>
            <a class="nav-link" href="{{ url_for('report', month=month if month is defined else None) }}">Aylık Rapor</a>
            <a class="nav-link" href="{{ url_for('yearly') }}">Yıllık Rapor</a>
          </div>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="d-flex flex-column gap-2 mb-3">
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} mb-0" role="alert">{{ message }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
